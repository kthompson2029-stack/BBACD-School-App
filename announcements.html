<!DOCTYPE html>
<html>

<head>
    <title>Announcements - Benjamin Banneker Academy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <img src="logo-e1673281046458.png" alt="BBA Logo">
    <h1>Announcements</h1>
</header>
<a href="index.html">
    <button>← Back Home</button>
</a>

<input 
    type="text" 
    id="search" 
    placeholder="🔍 Search announcements..."
>

<main id="announcements">

</main>




<nav>
    <a href="index.html">🏠 Home</a>
    <a href="announcements.html">📢 Announcements</a>
    <a href="calendar.html">📅 Calendar</a>
</nav>
<script>
fetch("announcements.json")
.then(response => response.json())
.then(data => {

    let box = document.getElementById("announcements");
    let search = document.getElementById("search");

    function displayAnnouncements(items) {
        box.innerHTML = "";

        items.forEach(item => {
            box.innerHTML += `
            <div class="card">
                <h2>
                    ${item.category}
                    ${item.new ? "🆕" : ""}
                </h2>
                <h3>${item.title}</h3>
                <small>${item.date}</small>
                <p>${item.message}</p>
            </div>
            `;
        });
    }

    displayAnnouncements(data);

    search.addEventListener("input", function() {

        let text = search.value.toLowerCase();

        let filtered = data.filter(item =>
            item.title.toLowerCase().includes(text) ||
            item.message.toLowerCase().includes(text) ||
            item.category.toLowerCase().includes(text)
        );

        displayAnnouncements(filtered);

    });

});
</script>
</body>
</html>
