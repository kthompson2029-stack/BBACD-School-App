<!DOCTYPE html>
<html>
<head>
    <title>Benjamin Banneker Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#1e3a8a">
</head>

<body>

<div class="app">

    <header>
        <h1>🏫 Benjamin Banneker Academy</h1>
        <p>School App</p>
    </header>

    <main>

        <button onclick="showPage('announcements')">
            📢 Announcements
        </button>

        <button onclick="showPage('calendar')">
            📅 Calendar
        </button>

        <button onclick="showPage('events')">
            🎉 Events
        </button>

        <button onclick="showPage('links')">
            🔗 Important Links
        </button>

        <section id="content">
            <h2>Welcome!</h2>
            <p>Your school information in one place.</p>
        </section>

    </main>

</div>

<script src="app.js"></script>
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>
</body>
</html>
