<!DOCTYPE html>
<html>

<head>
<title>BBA Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<img src="logo-e1673281046458.png">
<h1>Admin Panel</h1>
</header>


<main>

<div class="card">

<h2>Post Announcement</h2>

<input id="title" placeholder="Announcement title">

<input id="date" placeholder="Date">

<input id="category" placeholder="Category">

<textarea id="message" placeholder="Message"></textarea>


<button onclick="postAnnouncement()">
Post Announcement
</button>
<button onclick="logout()">
Logout
</button>

</div>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    window.logout = function() {

    signOut(auth).then(() => {

        window.location.href = "login.html";

    });

};

const firebaseConfig = {
    apiKey: "AIzaSyDje4ceeQsSiWs2iPj_gG75l7d0RAu5cn0",
    authDomain: "bbacd-app.firebaseapp.com",
    projectId: "bbacd-app",
    storageBucket: "bbacd-app.firebasestorage.app",
    messagingSenderId: "325899500299",
    appId: "1:325899500299:web:6ec770dbb2bc6db3f4400e"
};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {

    if (!user) {
        window.location.href = "login.html";
    }

});

window.postAnnouncement = async function() {

    await addDoc(collection(db, "announcements"), {

        title: document.getElementById("title").value,

        date: document.getElementById("date").value,

        category: document.getElementById("category").value,

        message: document.getElementById("message").value,

        priority: "normal",

        new: true

    });


    alert("Announcement posted!");

};

</script>

</body>

</html>
